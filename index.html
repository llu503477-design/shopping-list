<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我家的私房菜">
<meta name="theme-color" content="#faf6f0">
<title>我家的私房菜</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf6f0;--parch:#f2ebe0;--sand:#e8ddd0;--sand2:#d9cabb;
  --bark:#8b6f5e;--bark2:#6b5244;--ink:#2c1f14;
  --sage:#4a7c59;--sl:#edf4ef;--sm:#c6deca;--sd:#2e5237;
  --amb:#b07828;--al:#fdf5e4;--am:#e8d4a0;
  --red:#b83a2a;--rl:#fdecea;
  --sh:0 2px 8px rgba(44,31,20,.07);--r:14px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--cream);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}
/* header */
.hdr{flex-shrink:0;background:var(--cream);padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 10px;border-bottom:1px solid var(--sand)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.twrap{display:flex;align-items:center;gap:5px;cursor:pointer}
.ttxt{font-size:18px;font-weight:700;color:var(--ink)}
.tpen{font-size:12px;color:var(--sand2)}
.tinp{font-size:18px;font-weight:700;border:none;border-bottom:2px solid var(--sage);background:transparent;outline:none;color:var(--ink);width:170px;font-family:inherit}
.hbts{display:flex;gap:2px}
.hbt{background:none;border:none;cursor:pointer;padding:6px;border-radius:9px;color:var(--bark);font-size:16px;display:flex;align-items:center}
.hbt:active{background:var(--parch)}
.swrap{position:relative;margin-top:8px}
.sinp{width:100%;padding:7px 12px 7px 32px;border:1.5px solid var(--sand);border-radius:20px;font-size:13px;background:var(--parch);color:var(--ink);outline:none;font-family:inherit}
.sinp:focus{border-color:var(--sage);background:#fff}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--bark);pointer-events:none}
/* layout */
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pg{display:none;padding:10px 13px 16px}
.pg.on{display:block}
/* nav */
.bnav{flex-shrink:0;background:var(--cream);border-top:1px solid var(--sand);display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;font-size:10px;color:var(--bark);background:none;border:none;cursor:pointer;font-family:inherit;transition:color .15s}
.nb.on{color:var(--sage)}
.nbw{width:34px;height:24px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.nb.on .nbw{background:var(--sl)}
.nbi{font-size:17px;line-height:1}
/* cards */
.rcard{background:#fff;border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--sand)}
.ri{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--parch);cursor:pointer;transition:background .1s}
.ri:last-child{border-bottom:none}
.ri:active{background:var(--parch)}
.re{font-size:22px;width:42px;height:42px;background:var(--parch);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.re img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.rname{font-size:14px;font-weight:600;color:var(--ink)}
.ring{font-size:11px;color:var(--bark);margin-top:2px}
.chev{color:var(--sand2);font-size:14px;flex-shrink:0}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--amb);display:inline-block;margin-left:4px;vertical-align:middle}
/* weekly (本周) */
.day-block{background:#fff;border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--sand)}
.day-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--parch);border-bottom:1px solid var(--sand)}
.day-label{font-size:13px;font-weight:700;color:var(--ink)}
.day-done{font-size:11px;color:var(--sage);font-weight:600}
.day-remind{font-size:11px;color:var(--amb);background:var(--al);padding:2px 8px;border-radius:20px;border:1px solid var(--am)}
/* 横向滚动表格 */
.day-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-scroll::-webkit-scrollbar{display:none}
.day-table{border-collapse:collapse;min-width:360px;width:100%}
.day-table th{font-size:10px;font-weight:600;color:var(--bark);padding:6px 8px;text-align:center;border-bottom:1px solid var(--sand);white-space:nowrap;background:var(--cream)}
.day-table .row-lbl{font-size:11px;font-weight:600;color:var(--ink);padding:6px 8px;white-space:nowrap;vertical-align:top;background:#fff;border-right:1px solid var(--sand)}
.day-cell{padding:5px 6px;vertical-align:top;border-left:1px solid var(--parch);min-width:90px}
.meal-item{display:flex;align-items:center;gap:5px;padding:3px 6px;background:var(--sl);border-radius:7px;margin-bottom:3px;cursor:pointer;transition:opacity .15s}
.meal-item.done{opacity:.35}
.meal-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--sage);flex-shrink:0;cursor:pointer}
.meal-item-name{font-size:11px;color:var(--sd);font-weight:500;flex:1;line-height:1.3}
.remind-block{background:var(--al);border-radius:var(--r);padding:10px 13px;margin-bottom:8px;border:1.5px solid var(--am)}
.remind-ttl{font-size:11px;font-weight:600;color:var(--amb);margin-bottom:6px}
.remind-row{display:flex;align-items:flex-start;gap:7px;padding:3px 0;font-size:12px;color:var(--bark2)}
/* next week */
.wscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:0 -13px;padding:0 13px 4px}
.wscroll::-webkit-scrollbar{display:none}
.wtbl{border-collapse:separate;border-spacing:4px;min-width:480px}
.wtbl th{font-size:10px;font-weight:600;color:var(--bark);padding:2px 3px;text-align:center;white-space:nowrap}
.dth{font-size:10px;font-weight:600;color:var(--ink);padding:2px 5px;text-align:left;white-space:nowrap;width:30px}
.wc{background:#fff;border:1.5px solid var(--sand);border-radius:9px;padding:4px;min-height:52px;cursor:pointer;vertical-align:top;width:84px;transition:all .12s}
.wc.has{border-color:var(--sm);background:var(--sl)}
.wc .ah{color:var(--sand2);text-align:center;font-size:17px;padding-top:8px}
.mchip{font-size:9px;font-weight:500;background:#fff;border-radius:4px;padding:2px 4px;margin-bottom:2px;display:flex;align-items:center;gap:2px;border:1px solid var(--sand)}
.mcn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--sd)}
.mcx{color:var(--bark);cursor:pointer;font-size:10px;flex-shrink:0}
.prow{display:flex;align-items:center;gap:6px;margin:14px 0 6px}
.pava{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
/* shopping */
.loc-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;position:sticky;top:0;background:var(--cream);padding-top:2px;z-index:10}
.loc-tabs::-webkit-scrollbar{display:none}
.ltab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--sand);color:var(--bark);background:#fff;white-space:nowrap;transition:all .12s;flex-shrink:0}
.ltab.on{background:var(--sage);border-color:var(--sage);color:#fff}
.ltab.done-tab{background:var(--parch);border-color:var(--sand2);color:var(--sand2);text-decoration:line-through}
.scard{border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--sand);margin-bottom:10px}
.si{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--parch);background:#fff;cursor:pointer;transition:background .1s}
.si:last-child{border-bottom:none}
.si:active{background:var(--parch)}
.si.selected{background:var(--sl)}
.si-sel{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--sand2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s}
.si-sel.on{background:var(--sage);border-color:var(--sage);color:#fff}
.sin{flex:1;font-size:13px;color:var(--ink)}
.siq{font-size:11px;color:var(--bark)}
.sloc-tag{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:500;border:1px solid var(--sm);background:var(--sl);color:var(--sd)}
.shop-action-bar{position:sticky;bottom:0;background:var(--cream);padding:8px 0 4px;border-top:1px solid var(--sand);margin:0 -13px;padding:8px 13px 4px}
.prog-card{background:#fff;border-radius:var(--r);padding:11px 13px;margin-bottom:8px;box-shadow:var(--sh);border:1px solid var(--sand)}
.pb{background:var(--sand);border-radius:20px;height:5px;margin-top:3px}
.pbf{background:var(--sage);height:5px;border-radius:20px;transition:width .3s}
/* modal */
.mo{position:fixed;inset:0;background:rgba(44,31,20,.5);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.op{opacity:1;pointer-events:all}
.mbox{background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-width:430px;margin:0 auto;padding:0 0 env(safe-area-inset-bottom,12px);max-height:90vh;overflow-y:auto;transform:translateY(40px);transition:transform .22s cubic-bezier(.32,1,.4,1)}
.mo.op .mbox{transform:translateY(0)}
.mhan{width:36px;height:4px;background:var(--sand2);border-radius:2px;margin:10px auto 0}
.mhdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sand);flex-shrink:0}
.mttl{font-size:15px;font-weight:700;color:var(--ink)}
.mbdy{padding:12px 16px 16px}
.mcls{background:none;border:none;font-size:20px;color:var(--bark);cursor:pointer;padding:3px;line-height:1}
/* recipe detail editable */
.editable{border:none;border-bottom:1px solid var(--sand2);background:transparent;font-size:13px;color:var(--ink);font-family:inherit;outline:none;width:100%;padding:2px 0}
.editable:focus{border-bottom-color:var(--sage)}
.ingrow{display:flex;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--parch)}
.ingrow:last-child{border-bottom:none}
.steprow{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--parch)}
.steprow:last-child{border-bottom:none}
.snum{width:19px;height:19px;min-width:19px;background:var(--sage);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:2px}
.rmbtn{background:none;border:none;color:var(--sand2);cursor:pointer;font-size:16px;padding:0 1px;line-height:1}
.dimgwrap{width:100%;border-radius:11px;overflow:hidden;background:var(--parch);margin-bottom:12px;min-height:100px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.dimgwrap img{width:100%;display:block}
.dph{font-size:44px;padding:24px}
.iuhint{position:absolute;bottom:7px;right:7px;background:rgba(44,31,20,.5);color:#fff;font-size:10px;padding:3px 7px;border-radius:18px}
.prep-box{background:var(--al);border-radius:9px;padding:9px 12px;margin-bottom:12px;border:1px solid var(--am);font-size:12px;color:var(--bark2);line-height:1.5}
.sl2{font-size:10px;font-weight:600;color:var(--bark);letter-spacing:.6px;text-transform:uppercase;margin:11px 0 5px}
/* form */
input[type=text],textarea,select{width:100%;padding:8px 10px;border:1.5px solid var(--sand);border-radius:10px;font-size:13px;background:var(--parch);color:var(--ink);font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color .15s}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--sage);background:#fff}
input[type=number]{width:58px;padding:6px 8px;border:1.5px solid var(--sand);border-radius:8px;font-size:13px;background:var(--parch);color:var(--ink);font-family:inherit;outline:none}
input[type=number]:focus{border-color:var(--sage);background:#fff}
.fl{font-size:11px;font-weight:600;color:var(--bark);margin-bottom:3px}
.fg{margin-bottom:10px}
.bp{width:100%;padding:11px;background:var(--sage);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .15s}
.bp:active{background:var(--sd)}
.bp.amb{background:var(--amb)}
.bo{padding:6px 11px;background:none;border:1.5px solid var(--sage);color:var(--sage);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.bo.red{border-color:var(--red);color:var(--red)}
.bo.bark{border-color:var(--sand2);color:var(--bark)}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--sand);color:var(--bark);background:var(--parch)}
.chip.on{background:var(--sl);border-color:var(--sm);color:var(--sd)}
.empty{text-align:center;padding:32px 20px;color:var(--bark)}
.empty .ei{font-size:42px;margin-bottom:8px}
.empty p{font-size:13px;line-height:1.6}
.mem-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--parch);cursor:pointer}
.mem-row:last-child{border-bottom:none}
.ava{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.note-row{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--parch);border-radius:8px;margin-bottom:5px;font-size:12px}
.loc-opt{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid var(--parch);cursor:pointer;transition:background .1s}
.loc-opt:last-child{border-bottom:none}
.loc-opt:active{background:var(--parch)}
.loc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-row">
    <div class="twrap" id="twrap" onclick="startTitle()">
      <span class="ttxt" id="ttxt">我家的私房菜</span>
      <span class="tpen">✏️</span>
    </div>
    <div class="hbts">
      <button class="hbt" id="hb2" style="display:none" onclick="openMembers()">👨‍👩‍👧</button>
      <button class="hbt" id="hb1" onclick="hdrAct()">＋</button>
    </div>
  </div>
  <div id="swrap" style="display:none">
    <div class="swrap"><span class="sico">🔍</span>
    <input class="sinp" id="srch" placeholder="搜索菜名或食材…" oninput="renderRecipes()"></div>
  </div>
</div>
<div class="body">
  <div class="pg on" id="pg0"><div id="rlist"></div></div>
  <div class="pg" id="pg1"><div id="thisweek"></div></div>
  <div class="pg" id="pg2"><div id="nextweek"></div></div>
  <div class="pg" id="pg3"><div id="shop"></div></div>
</div>
<nav class="bnav">
  <button class="nb on" id="nb0" onclick="goTab(0)"><div class="nbw"><span class="nbi">🍳</span></div><span>菜谱</span></button>
  <button class="nb" id="nb1" onclick="goTab(1)"><div class="nbw"><span class="nbi">📋</span></div><span>本周</span></button>
  <button class="nb" id="nb2" onclick="goTab(2)"><div class="nbw"><span class="nbi">📅</span></div><span>下周</span></button>
  <button class="nb" id="nb3" onclick="goTab(3)"><div class="nbw"><span class="nbi">🛒</span></div><span>买菜</span></button>
</nav>
</div>
<div class="mo" id="modal" onclick="mOut(event)">
  <div class="mbox">
    <div class="mhan"></div>
    <div class="mhdr"><span class="mttl" id="mttl"></span><button class="mcls" onclick="closeM()">×</button></div>
    <div class="mbdy" id="mbdy"></div>
  </div>
</div>
<input type="file" id="imgfile" accept="image/*" style="display:none" onchange="onImg(event)">
<script>
const DAYS=['周一','周二','周三','周四','周五','周六','周日'];
const MEALS_NW=[{k:'breakfast',l:'早餐',i:'🌅'},{k:'lunch',l:'午餐',i:'☀️'},{k:'dinner',l:'晚餐',i:'🌙'}];
const AVC=['#4a7c59','#1a60a8','#a0296b','#5a3ab7','#b07828','#b83a2a'];
const STC=['#4a7c59','#1a60a8','#a0296b','#5a3ab7','#b07828'];

let S={
  title:'我家的私房菜',
  recipes:[
    {id:1,name:'红烧肉',emoji:'🥩',prepDays:0,prepNote:'',ing:[{n:'五花肉',q:'500g'},{n:'老抽',q:'2勺'},{n:'冰糖',q:'适量'},{n:'葱姜蒜',q:'适量'}],steps:['五花肉焯水','炒糖色','加调料焖1小时','大火收汁'],imgData:''},
    {id:2,name:'酱牛肉',emoji:'🥩',prepDays:1,prepNote:'提前一天腌制牛肉12小时',ing:[{n:'牛腱子',q:'500g'},{n:'老抽',q:'3勺'},{n:'八角',q:'2个'},{n:'花椒',q:'适量'}],steps:['提前腌制12小时','冷水焯水','小火焖1.5小时','晾凉切片'],imgData:''},
    {id:3,name:'番茄炒鸡蛋',emoji:'🍅',prepDays:0,prepNote:'',ing:[{n:'番茄',q:'2个'},{n:'鸡蛋',q:'3个'},{n:'盐',q:'适量'}],steps:['鸡蛋打散加盐','热锅炒蛋盛出','炒番茄出汁加鸡蛋翻炒'],imgData:''},
    {id:4,name:'清蒸鱼',emoji:'🐟',prepDays:0,prepNote:'',ing:[{n:'鲈鱼',q:'1条'},{n:'姜',q:'数片'},{n:'葱',q:'适量'},{n:'豉油',q:'2勺'}],steps:['鱼划刀塞姜','水开蒸8分钟','淋热油和豉油'],imgData:''},
  ],
  members:[
    {id:'m1',name:'妈妈',emoji:'👩',color:AVC[2],notes:'少盐少油，不吃辣'},
    {id:'m2',name:'爸爸',emoji:'👨',color:AVC[0],notes:'无特殊要求'},
    {id:'m3',name:'孩子',emoji:'🧒',color:AVC[3],notes:'不吃香菜'},
  ],
  thisWeek:{},   // key: "dayIdx-mealKey-ownerId" => [{id,name,emoji,done}]
  nextWeek:{},   // key: "ownerId-dayIdx-mealKey" => [{id,name,emoji}]
  tempRecipes:[], // for next-week only, not in library
  shop:{stores:[{id:'s1',name:'菜市场',color:STC[0]},{id:'s2',name:'超市',color:STC[1]}],items:[],selectedIds:[]}
};

function sv(){try{localStorage.setItem('hcv9',JSON.stringify(S))}catch(e){}}
function ld(){try{const d=localStorage.getItem('hcv9');if(d)S=JSON.parse(d)}catch(e){}}
ld();
document.getElementById('ttxt').textContent=S.title||'我家的私房菜';
if(!S.thisWeek)S.thisWeek={};
if(!S.nextWeek)S.nextWeek={};
if(!S.tempRecipes)S.tempRecipes=[];
if(!S.shop.selectedIds)S.shop.selectedIds=[];

function startTitle(){
  const w=document.getElementById('twrap');
  w.innerHTML=`<input class="tinp" id="ti" value="${S.title}" onblur="saveTitle()" onkeydown="if(event.key==='Enter')this.blur()">`;
  document.getElementById('ti').focus();
}
function saveTitle(){
  const v=document.getElementById('ti')?.value.trim()||'我家的私房菜';
  S.title=v;sv();
  const w=document.getElementById('twrap');
  w.innerHTML=`<span class="ttxt" id="ttxt">${v}</span><span class="tpen">✏️</span>`;
  w.onclick=startTitle;
}

let curTab=0;
function goTab(t){
  curTab=t;
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('on',i===t));
  document.querySelectorAll('.pg').forEach((p,i)=>p.classList.toggle('on',i===t));
  // header buttons
  document.getElementById('hb1').style.display=(t===1||t===3)?'none':'flex';
  document.getElementById('hb1').textContent=t===3?'🏪':(t===2?'':'＋');
  document.getElementById('hb2').style.display=(t===1||t===2)?'flex':'none';
  document.getElementById('swrap').style.display=t===0?'block':'none';
  document.querySelector('.body').scrollTop=0;
  if(t===0)renderRecipes();
  if(t===1)renderThisWeek();
  if(t===2)renderNextWeek();
  if(t===3)renderShop();
}
function hdrAct(){
  if(curTab===0)openAddR();
  if(curTab===3)openStores();
}

function rmStep(id,x){const r=S.recipes.find(x=>x.id===id);if(r){r.steps.splice(x,1);sv();renderDetail(r)}}

// key: dayIdx + '-' + mealKey + '-' + ownerId
// value: [{id, name, emoji, done}]
function twKey(d,m,o){return`${d}-${m}-${o}`}
function getTW(d,m,o){return S.thisWeek[twKey(d,m,o)]||[]}
function setTW(d,m,o,arr){S.thisWeek[twKey(d,m,o)]=arr;sv()}

function renderThisWeek(){
  const owners=[{id:'family',name:'家庭餐',emoji:'🏠',color:'#4a7c59'},...S.members.map(m=>({id:m.id,name:m.name,emoji:m.emoji,color:m.color}))];
  const el=document.getElementById('thisweek');

  // prep reminders
  const allIds=new Set();
  Object.values(S.thisWeek).forEach(arr=>(arr||[]).forEach(m=>allIds.add(m.id)));
  const reminds=S.recipes.filter(r=>allIds.has(r.id)&&r.prepDays>0);

  let html='';
  if(reminds.length){
    html+=`<div class="remind-block"><div class="remind-ttl">⏰ 本周需要提前准备</div>
      ${reminds.map(r=>`<div class="remind-row"><span>${r.emoji}</span><div><b>${r.name}</b> — 提前${r.prepDays}天<br><span style="font-size:11px">${r.prepNote||''}</span></div></div>`).join('')}
    </div>`;
  }

  DAYS.forEach((day,di)=>{
    // check if all meals for all owners are done → hide day
    let totalItems=0,doneItems=0;
    owners.forEach(ow=>{
      MEALS_NW.forEach(mc=>{
        const arr=getTW(di,mc.k,ow.id);
        arr.forEach(item=>{totalItems++;if(item.done)doneItems++;});
      });
    });
    if(totalItems>0&&totalItems===doneItems)return; // hide completed days

    html+=`<div class="day-block">
      <div class="day-hdr">
        <span class="day-label">第${di+1}天 · ${day}</span>
        ${totalItems>0?`<span style="font-size:11px;color:var(--bark)">${doneItems}/${totalItems}</span>`:''}
      </div>
      <div class="day-scroll">
        <table class="day-table">
          <thead><tr><th></th>${MEALS_NW.map(m=>`<th>${m.i} ${m.l}</th>`).join('')}</tr></thead>
          <tbody>${owners.map(ow=>`<tr>
            <td class="row-lbl"><div style="display:flex;align-items:center;gap:4px"><span style="font-size:13px">${ow.emoji}</span><span>${ow.name}</span></div></td>
            ${MEALS_NW.map(mc=>{
              const arr=getTW(di,mc.k,ow.id);
              return`<td class="day-cell">${arr.length?arr.map(item=>`
                <div class="meal-item${item.done?' done':''}">
                  <input type="checkbox" ${item.done?'checked':''} onchange="toggleTW(${di},'${mc.k}','${ow.id}','${item.id}',this.checked)">
                  <span class="meal-item-name">${item.emoji} ${item.name}</span>
                </div>`).join(''):'<span style="color:var(--sand2);font-size:11px">—</span>'}</td>`;
            }).join('')}
          </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  });

  if(!html.includes('day-block'))html+=`<div class="empty"><div class="ei">🎉</div><p>本周所有餐食已完成！<br>去下周页规划新一周</p></div>`;
  el.innerHTML=html;
}

function toggleTW(di,mk,oid,itemId,checked){
  const arr=getTW(di,mk,oid);
  const item=arr.find(x=>String(x.id)===String(itemId));
  if(item)item.done=checked;
  setTW(di,mk,oid,arr);
  renderThisWeek();
}

function saveTempR(owner,day,meal,label){
  const name=document.getElementById('tfn').value.trim();if(!name){alert('请输入菜名');return}

  const ing=[...document.getElementById('ting-wrap').querySelectorAll('.ingrow')].map(row=>{
    const inputs=row.querySelectorAll('input');return{n:inputs[0]?.value.trim()||'',q:inputs[1]?.value.trim()||''};
  }).filter(i=>i.n);
  const tempId='tmp'+Date.now();
  S.tempRecipes.push({id:tempId,name,emoji,ing,steps:[],prepDays:0,prepNote:'',imgData:'',temp:true});

function saveNextWeek(){
  // copy nextWeek plan into thisWeek (replace), generate shopping list
  // merge into thisWeek
  Object.keys(S.nextWeek).forEach(key=>{
    const parts=key.split('-'); // ownerId-dayIdx-mealKey  (ownerId may have 'm' prefix)
    // key format: ownerId-dayIdx-mealKey
    const lastDash2=key.lastIndexOf('-');
    const mealKey=key.substring(lastDash2+1);
    const rest=key.substring(0,lastDash2);
    const lastDash1=rest.lastIndexOf('-');
    const dayIdx=rest.substring(lastDash1+1);
    const ownerId=rest.substring(0,lastDash1);
    const twk=twKey(dayIdx,mealKey,ownerId);
    // convert to thisWeek format (add done:false)
    S.thisWeek[twk]=(S.nextWeek[key]||[]).map(m=>({...m,done:false}));
  });
  // generate shopping list
  const allR=[...S.recipes,...S.tempRecipes];
  const map={};
  Object.keys(S.nextWeek).filter(k=>k.startsWith('family-')).forEach(k=>(S.nextWeek[k]||[]).forEach(m=>{
    const r=allR.find(x=>x.id===m.id);
    if(r)r.ing.forEach(i=>{if(!map[i.n])map[i.n]={id:Date.now()+Math.random(),name:i.n,qty:i.q,storeId:null,checked:false,selected:false}});
  }));
  Object.keys(S.nextWeek).filter(k=>!k.startsWith('family-')).forEach(k=>(S.nextWeek[k]||[]).forEach(m=>{
    const r=allR.find(x=>x.id===m.id);
    if(r)r.ing.forEach(i=>{if(!map[i.n])map[i.n]={id:Date.now()+Math.random(),name:i.n,qty:i.q,storeId:null,checked:false,selected:false}});
  }));
  S.shop.items=Object.values(map);
  S.shop.selectedIds=[];
  // clear next week after saving
  S.nextWeek={};
  S.tempRecipes=[];
  sv();
  alert('已保存为本周计划，买菜清单已生成！');
  goTab(3);
}

   MEMBERS
══════════════════════════════ */
function openMembers(){document.getElementById('mttl').textContent='家庭成员';renderMemBody();openM()}
function renderMemBody(){
  document.getElementById('mbdy').innerHTML=`
    <div class="rcard" style="padding:0 13px;margin-bottom:10px">${S.members.map(m=>`
      <div class="mem-row" onclick="editMem('${m.id}')">
        <div class="ava" style="background:${m.color}22;color:${m.color}">${m.emoji}</div>
        <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">${m.name}</div><div style="font-size:11px;color:var(--bark);margin-top:1px">${m.notes||'无特殊要求'}</div></div>
        <span style="color:var(--sand2)">›</span>
      </div>`).join('')}
    </div>
    <button class="bo bark" style="width:100%" onclick="addMem()">＋ 添加成员</button>`;
}
function editMem(id){
  const m=S.members.find(x=>x.id===id);if(!m)return;
  document.getElementById('mttl').textContent='编辑成员';
  document.getElementById('mbdy').innerHTML=`
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:0 0 60px"><div class="fl">图标</div><input type="text" id="mi" value="${m.emoji}"></div>
      <div class="fg" style="flex:1"><div class="fl">名称</div><input type="text" id="mn" value="${m.name}"></div>
    </div>
    <div class="fg"><div class="fl">饮食备注</div><input type="text" id="mo" value="${m.notes||''}" placeholder="例：不吃辣"></div>
    <div style="display:flex;gap:7px">
      <button class="bp" style="flex:1" onclick="saveMem('${id}')">保存</button>
      <button class="bo red" onclick="delMem('${id}')">删除</button>
    </div>`;
}
function addMem(){
  document.getElementById('mttl').textContent='添加成员';
  document.getElementById('mbdy').innerHTML=`
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:0 0 60px"><div class="fl">图标</div><input type="text" id="mi" value="👤"></div>
      <div class="fg" style="flex:1"><div class="fl">名称</div><input type="text" id="mn" placeholder="妈妈"></div>
    </div>
    <div class="fg"><div class="fl">饮食备注</div><input type="text" id="mo" placeholder="例：不吃辣"></div>
    <button class="bp" onclick="saveMem(null)">添加</button>`;
}
function saveMem(id){
  const name=document.getElementById('mn').value.trim();if(!name){alert('请输入名称');return}
  const mem={id:id||'m'+Date.now(),name,emoji:document.getElementById('mi').value||'👤',color:AVC[S.members.length%AVC.length],notes:document.getElementById('mo').value.trim()};
  if(id){const i=S.members.findIndex(m=>m.id===id);if(i>=0)S.members[i]=mem}else S.members.push(mem);
  sv();renderMemBody();
}
function delMem(id){if(!confirm('删除？'))return;S.members=S.members.filter(m=>m.id!==id);sv();renderMemBody()}

/* ══════════════════════════════
   SHOPPING
══════════════════════════════ */
function renderShop(){
  const c=document.getElementById('shop');
  const items=S.shop.items;
  const sel=S.shop.selectedIds||[];

  if(!items.length){
    c.innerHTML=`<div class="empty"><div class="ei">🛒</div><p>先在下周页规划菜单<br>再保存生成买菜清单</p></div><div style="margin-top:12px"><button class="bp amb" onclick="goTab(2)">📅 去规划下周菜单</button></div>`;
    return;
  }

  // group by store
  const stores=S.shop.stores;
  const unassigned=items.filter(i=>!i.storeId&&!i.checked);
  const checked=items.filter(i=>i.checked);

  // store tabs at top
  let html=`<div class="loc-tabs" id="loc-tabs">`;
  html+=`<span class="ltab on" id="ltab-all" onclick="filterShop('all')">全部</span>`;
  stores.forEach(st=>{
    const stItems=items.filter(i=>i.storeId===st.id&&!i.checked);
    const allDone=stItems.length>0&&stItems.every(i=>i.checked);
    html+=`<span class="ltab${allDone?' done-tab':''}" id="ltab-${st.id}" onclick="filterShop('${st.id}')">${st.name} ${stItems.length?`(${stItems.length})`:'✓'}</span>`;
  });
  html+=`</div>`;

  // progress
  const ck=items.filter(i=>i.checked).length,tot=items.length;
  html+=`<div class="prog-card"><div style="font-size:10px;font-weight:600;color:var(--bark);letter-spacing:.5px;text-transform:uppercase">采购进度</div><div style="font-size:22px;font-weight:700;margin:3px 0">${ck} <span style="font-size:13px;color:var(--bark);font-weight:400">/ ${tot} 项</span></div><div class="pb"><div class="pbf" style="width:${Math.round(ck/tot*100)}%"></div></div></div>`;

  // store sections
  stores.forEach(st=>{
    const stItems=items.filter(i=>i.storeId===st.id&&!i.checked);
    if(!stItems.length)return;
    html+=`<div style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--parch);border-radius:var(--r) var(--r) 0 0;border:1px solid var(--sand);border-bottom:none">
        <span style="font-size:14px">🏪</span><span style="font-size:13px;font-weight:600;flex:1">${st.name}</span>
        <span style="font-size:11px;color:var(--bark)">${stItems.length} 项</span>
      </div>
      <div class="scard" style="border-radius:0 0 var(--r) var(--r);border-top:none">
        ${stItems.map(it=>siHTML(it,sel)).join('')}
      </div>
    </div>`;
  });

  // unassigned
  if(unassigned.length){
    html+=`<div class="sl2" style="margin-top:12px">待分配地点（${unassigned.length}项）</div>
    <div class="scard">${unassigned.map(it=>siHTML(it,sel)).join('')}</div>`;
  }

  // checked/done
  if(checked.length){
    html+=`<div class="sl2" style="margin-top:12px;color:var(--sand2)">已购买（${checked.length}项）</div>
    <div class="scard" style="opacity:.55">${checked.map(it=>`<div class="si"><span class="chk on">✓</span><span class="sin" style="text-decoration:line-through;color:var(--bark)">${it.name}</span><span class="siq">${it.qty}</span></div>`).join('')}</div>`;
  }

  // bottom action bar
  const selCount=sel.length;
  html+=`<div style="height:64px"></div>
  <div class="shop-action-bar">
    ${selCount>0
      ?`<button class="bp" onclick="openLocAssign()">为选中的 ${selCount} 项分配购买地点</button>`
      :`<div style="display:flex;gap:7px">
        <button class="bo bark" style="flex:1" onclick="addManualItem()">＋ 手动添加</button>
        ${ck>0?`<button class="bo red" onclick="clearChecked()">清除已购买</button>`:''}
      </div>`
    }
  </div>`;

  c.innerHTML=html;
}

function siHTML(it,sel){
  const isSel=(sel||[]).includes(String(it.id));
  const store=S.shop.stores.find(s=>s.id===it.storeId);
  return`<div class="si${isSel?' selected':''}" onclick="toggleSel('${it.id}')">
    <div class="si-sel${isSel?' on':''}">${isSel?'✓':''}</div>
    <span class="sin">${it.name}</span>
    <span class="siq">${it.qty}</span>
    ${store?`<span class="sloc-tag">${store.name}</span>`:''}
    <button onclick="event.stopPropagation();toggleItemDone('${it.id}')" style="background:none;border:none;color:var(--sand2);cursor:pointer;font-size:13px;padding:2px 4px">${it.checked?'↩':'✓'}</button>
  </div>`;
}

function toggleSel(id){
  if(!S.shop.selectedIds)S.shop.selectedIds=[];
  const idx=S.shop.selectedIds.indexOf(String(id));
  if(idx>=0)S.shop.selectedIds.splice(idx,1);
  else S.shop.selectedIds.push(String(id));
  sv();renderShop();
}

function toggleItemDone(id){
  const it=S.shop.items.find(x=>String(x.id)===String(id));
  if(it){it.checked=!it.checked;if(it.checked)S.shop.selectedIds=(S.shop.selectedIds||[]).filter(s=>s!==String(id));}
  sv();renderShop();
}

function openLocAssign(){
  document.getElementById('mttl').textContent='选择购买地点';
  document.getElementById('mbdy').innerHTML=`
    <p style="font-size:13px;color:var(--bark);margin-bottom:12px">为选中的 ${S.shop.selectedIds.length} 项食材选择购买地点：</p>
    <div class="rcard" style="padding:0 13px">
      <div class="loc-opt" onclick="assignLoc(null)"><div class="loc-dot" style="background:var(--sand2)"></div><span style="flex:1;font-size:14px">不指定</span></div>
      ${S.shop.stores.map(s=>`<div class="loc-opt" onclick="assignLoc('${s.id}')"><div class="loc-dot" style="background:${s.color}"></div><span style="flex:1;font-size:14px">${s.name}</span></div>`).join('')}
    </div>`;
  openM();
}
function assignLoc(storeId){
  (S.shop.selectedIds||[]).forEach(id=>{
    const it=S.shop.items.find(x=>String(x.id)===String(id));
    if(it)it.storeId=storeId;
  });
  S.shop.selectedIds=[];
  sv();closeM();renderShop();
}

function filterShop(storeId){
  // visual only — highlight tab
  document.querySelectorAll('.ltab').forEach(t=>t.classList.remove('on'));
  const el=document.getElementById('ltab-'+(storeId==='all'?'all':storeId));
  if(el)el.classList.add('on');
  // scroll to store section if needed (simplified: just render)
}

function addManualItem(){
  document.getElementById('mttl').textContent='手动添加食材';
  document.getElementById('mbdy').innerHTML=`
    <div class="fg"><div class="fl">食材名</div><input type="text" id="sin" placeholder="例：大葱"></div>
    <div class="fg"><div class="fl">用量</div><input type="text" id="siq" placeholder="例：2根"></div>
    <button class="bp" onclick="saveManualItem()">添加</button>`;
  openM();
}
function saveManualItem(){
  const n=document.getElementById('sin').value.trim();if(!n)return;
  S.shop.items.push({id:Date.now(),name:n,qty:document.getElementById('siq').value.trim(),storeId:null,checked:false,selected:false});
  sv();closeM();renderShop();
}
function clearChecked(){S.shop.items=S.shop.items.filter(i=>!i.checked);sv();renderShop()}

function openStores(){
  document.getElementById('mttl').textContent='管理购买地点';renderStoresBody();openM();
}
function renderStoresBody(){
  document.getElementById('mbdy').innerHTML=`
    <div style="margin-bottom:10px">${S.shop.stores.map(s=>`
      <div class="note-row"><div style="width:9px;height:9px;border-radius:50%;background:${s.color};flex-shrink:0"></div><span style="flex:1">${s.name}</span><button onclick="delSt('${s.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px">×</button></div>`).join('')}
    </div>
    <div style="display:flex;gap:7px"><input type="text" id="nstn" placeholder="新地点名称" style="flex:1"><button class="bo" onclick="addSt()">添加</button></div>`;
}
function addSt(){const n=document.getElementById('nstn').value.trim();if(!n)return;S.shop.stores.push({id:'s'+Date.now(),name:n,color:STC[S.shop.stores.length%STC.length]});sv();renderStoresBody()}
function delSt(id){S.shop.stores=S.shop.stores.filter(s=>s.id!==id);S.shop.items.forEach(i=>{if(i.storeId===id)i.storeId=null});sv();renderStoresBody()}

function openM(){document.getElementById('modal').classList.add('op')}
function closeM(){document.getElementById('modal').classList.remove('op')}
function mOut(e){if(e.target===document.getElementById('modal'))closeM()}

// init
renderRecipes();
document.getElementById('swrap').style.display='block';
</script>
</body>
</html>
