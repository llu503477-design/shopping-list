<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我家的私房菜">
<meta name="theme-color" content="#faf6f0">
<title>我家的私房菜</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf6f0;--parch:#f2ebe0;--sand:#e8ddd0;--sand2:#d9cabb;
  --bark:#8b6f5e;--bark2:#6b5244;--ink:#2c1f14;
  --sage:#4a7c59;--sl:#edf4ef;--sm:#c6deca;--sd:#2e5237;
  --amb:#b07828;--al:#fdf5e4;--am:#e8d4a0;
  --red:#b83a2a;--rl:#fdecea;
  --bd:rgba(139,111,94,.13);--sh:0 2px 8px rgba(44,31,20,.07);--r:14px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--cream);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}
.hdr{flex-shrink:0;background:var(--cream);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 10px;border-bottom:1px solid var(--sand);z-index:90}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.twrap{display:flex;align-items:center;gap:6px;cursor:pointer}
.ttxt{font-size:19px;font-weight:700;color:var(--ink)}
.tpen{font-size:13px;color:var(--sand2)}
.tinp{font-size:19px;font-weight:700;border:none;border-bottom:2px solid var(--sage);background:transparent;outline:none;color:var(--ink);width:180px;font-family:inherit}
.hbt{background:none;border:none;cursor:pointer;padding:6px;border-radius:10px;color:var(--bark);font-size:17px;display:flex;align-items:center}
.hbt:active{background:var(--parch)}
.swrap{position:relative;margin-top:9px}
.sinp{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--sand);border-radius:22px;font-size:13px;background:var(--parch);color:var(--ink);outline:none;font-family:inherit}
.sinp:focus{border-color:var(--sage);background:#fff}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--bark);pointer-events:none}
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pg{display:none;padding:12px 14px 20px}
.pg.on{display:block}
.bnav{flex-shrink:0;background:var(--cream);border-top:1px solid var(--sand);display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 7px;font-size:11px;color:var(--bark);background:none;border:none;cursor:pointer;font-family:inherit;transition:color .15s}
.nb.on{color:var(--sage)}
.nbw{width:38px;height:26px;border-radius:13px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.nb.on .nbw{background:var(--sl)}
.nbi{font-size:18px;line-height:1}
/* recipe */
.rcard{background:#fff;border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--sand)}
.ri{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--parch);cursor:pointer;transition:background .1s}
.ri:last-child{border-bottom:none}
.ri:active{background:var(--parch)}
.re{font-size:24px;width:44px;height:44px;background:var(--parch);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative}
.re img{width:100%;height:100%;object-fit:cover;border-radius:11px}
.rname{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.ring{font-size:11px;color:var(--bark);margin-top:2px}
.rstatus{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:4px}
.s-l{background:var(--al);color:var(--amb);border:1px solid var(--am)}
.s-d{background:var(--sl);color:var(--sd);border:1px solid var(--sm)}
.chev{color:var(--sand2);font-size:15px;flex-shrink:0}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--amb);position:absolute;top:3px;right:3px}
.fbar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.fbar::-webkit-scrollbar{display:none}
.fc{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--sand);color:var(--bark);background:var(--parch);white-space:nowrap;transition:all .12s}
.fc.on{background:var(--sl);border-color:var(--sm);color:var(--sd)}
/* weekly */
.wscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:0 -14px;padding:0 14px 6px}
.wscroll::-webkit-scrollbar{display:none}
.wtbl{border-collapse:separate;border-spacing:4px;min-width:480px}
.wtbl th{font-size:10px;font-weight:600;color:var(--bark);padding:2px 3px;text-align:center;white-space:nowrap}
.dth{font-size:10px;font-weight:600;color:var(--ink);padding:2px 5px;text-align:left;white-space:nowrap;width:30px}
.wc{background:#fff;border:1.5px solid var(--sand);border-radius:10px;padding:5px;min-height:56px;cursor:pointer;vertical-align:top;width:86px;transition:all .12s}
.wc.has{border-color:var(--sm);background:var(--sl)}
.wc .ah{color:var(--sand2);text-align:center;font-size:18px;padding-top:9px}
.mchip{font-size:9px;font-weight:500;background:#fff;border-radius:5px;padding:2px 4px;margin-bottom:2px;display:flex;align-items:center;gap:2px;border:1px solid var(--sand)}
.mcn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--sd)}
.mcx{color:var(--bark);cursor:pointer;font-size:11px;flex-shrink:0}
.prow{display:flex;align-items:center;gap:7px;margin:16px 0 7px}
.pava{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
/* shopping */
.sttl{font-size:11px;font-weight:600;color:var(--bark);letter-spacing:.5px;text-transform:uppercase;margin:14px 0 6px}
.scard{border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--sand);margin-bottom:8px}
.si{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid var(--parch);background:#fff}
.si:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--sand2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px;transition:all .15s}
.chk.on{background:var(--sage);border-color:var(--sage);color:#fff}
.sin{flex:1;font-size:14px;color:var(--ink)}
.sin.ck{color:var(--bark);text-decoration:line-through}
.siq{font-size:12px;color:var(--bark)}
.sloc{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500;cursor:pointer;flex-shrink:0;border:1px solid var(--sand);background:var(--parch);color:var(--bark);white-space:nowrap;transition:all .12s}
.sloc.set{background:var(--sl);border-color:var(--sm);color:var(--sd)}
.sedit{background:none;border:none;color:var(--sand2);cursor:pointer;font-size:13px;padding:2px 3px}
.si-add{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;background:#fff;color:var(--bark);border-top:1px dashed var(--sand)}
.si-add-ico{width:20px;height:20px;border-radius:50%;border:1.5px dashed var(--sand2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--bark);flex-shrink:0}
.si-edit-row{display:flex;align-items:center;gap:6px;padding:8px 11px;background:var(--sl);border-top:1.5px solid var(--sm)}
.si-edit-row input{padding:6px 9px;border:1.5px solid var(--sm);border-radius:9px;font-size:13px;background:#fff;color:var(--ink);font-family:inherit;outline:none}
.si-edit-row input:focus{border-color:var(--sage)}
.ni-n{flex:1;min-width:0}
.ni-q{width:62px}
.si-ok{background:var(--sage);color:#fff;border:none;border-radius:9px;padding:6px 11px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.ni-x{background:none;border:none;color:var(--bark);font-size:19px;cursor:pointer;padding:0 2px;line-height:1}
.prog-card{background:#fff;border-radius:var(--r);padding:13px 14px;margin-bottom:10px;box-shadow:var(--sh);border:1px solid var(--sand)}
.pb{background:var(--sand);border-radius:20px;height:5px;margin-top:3px}
.pbf{background:var(--sage);height:5px;border-radius:20px;transition:width .3s}
.remind-card{background:var(--al);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;border:1.5px solid var(--am)}
.remind-ttl{font-size:11px;font-weight:600;color:var(--amb);margin-bottom:7px}
.remind-item{font-size:12px;color:var(--bark2);padding:3px 0;display:flex;gap:7px;line-height:1.4}
.store-hdr{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--parch);border:1px solid var(--sand);border-bottom:none;border-radius:var(--r) var(--r) 0 0}
.store-nm{font-size:13px;font-weight:600;color:var(--ink);flex:1}
.store-ct{font-size:11px;color:var(--bark);background:var(--sand);padding:2px 7px;border-radius:20px}
/* modal */
.mo{position:fixed;inset:0;background:rgba(44,31,20,.5);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.op{opacity:1;pointer-events:all}
.mbox{background:var(--cream);border-radius:22px 22px 0 0;width:100%;max-width:430px;margin:0 auto;padding:0 0 env(safe-area-inset-bottom,14px);max-height:92vh;overflow-y:auto;transform:translateY(40px);transition:transform .22s cubic-bezier(.32,1,.4,1)}
.mo.op .mbox{transform:translateY(0)}
.mhan{width:38px;height:4px;background:var(--sand2);border-radius:2px;margin:11px auto 0}
.mhdr{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sand)}
.mttl{font-size:16px;font-weight:700;color:var(--ink)}
.mbdy{padding:14px 18px 18px}
.mcls{background:none;border:none;font-size:21px;color:var(--bark);cursor:pointer;padding:3px;line-height:1}
.dimgwrap{width:100%;border-radius:12px;overflow:hidden;background:var(--parch);margin-bottom:14px;min-height:110px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.dimgwrap img{width:100%;display:block}
.dph{font-size:48px;padding:28px}
.iuhint{position:absolute;bottom:8px;right:8px;background:rgba(44,31,20,.5);color:#fff;font-size:11px;padding:3px 8px;border-radius:20px}
.editable{border:none;border-bottom:1px solid var(--sand2);background:transparent;font-size:13px;color:var(--ink);font-family:inherit;outline:none;width:100%;padding:2px 0;transition:border-color .15s}
.editable:focus{border-bottom-color:var(--sage)}
.ingrow{display:flex;gap:7px;align-items:center;padding:7px 0;border-bottom:1px solid var(--parch)}
.ingrow:last-child{border-bottom:none}
.steprow{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--parch)}
.steprow:last-child{border-bottom:none}
.snum{width:20px;height:20px;min-width:20px;background:var(--sage);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:2px}
.rmbtn{background:none;border:none;color:var(--sand2);cursor:pointer;font-size:17px;padding:0 1px;line-height:1}
.sl2{font-size:10px;font-weight:600;color:var(--bark);letter-spacing:.7px;text-transform:uppercase;margin:13px 0 6px}
input[type=text],textarea,select{width:100%;padding:9px 11px;border:1.5px solid var(--sand);border-radius:11px;font-size:13px;background:var(--parch);color:var(--ink);font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color .15s}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--sage);background:#fff}
input[type=number]{width:60px;padding:7px 9px;border:1.5px solid var(--sand);border-radius:9px;font-size:13px;background:var(--parch);color:var(--ink);font-family:inherit;outline:none}
input[type=number]:focus{border-color:var(--sage);background:#fff}
.fl{font-size:11px;font-weight:600;color:var(--bark);margin-bottom:4px}
.fg{margin-bottom:12px}
.bp{width:100%;padding:12px;background:var(--sage);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .15s}
.bp:active{background:var(--sd)}
.bp.amb{background:var(--amb)}
.bo{padding:7px 12px;background:none;border:1.5px solid var(--sage);color:var(--sage);border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.bo.red{border-color:var(--red);color:var(--red)}
.bo.bark{border-color:var(--sand2);color:var(--bark)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--sand);color:var(--bark);background:var(--parch);transition:all .12s}
.chip.on{background:var(--sl);border-color:var(--sm);color:var(--sd)}
.empty{text-align:center;padding:36px 20px;color:var(--bark)}
.empty .ei{font-size:44px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}
.mem-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--parch);cursor:pointer}
.mem-row:last-child{border-bottom:none}
.ava{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.note-row{display:flex;align-items:center;gap:7px;padding:8px 11px;background:var(--parch);border-radius:9px;margin-bottom:5px;font-size:13px}
.prep-box{background:var(--al);border-radius:10px;padding:10px 13px;margin-bottom:13px;border:1px solid var(--am);font-size:12px;color:var(--bark2);line-height:1.5}
.loc-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--parch);cursor:pointer;transition:background .1s}
.loc-opt:last-child{border-bottom:none}
.loc-opt:active{background:var(--parch)}
.loc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-row">
    <div class="twrap" id="twrap" onclick="startTitle()">
      <span class="ttxt" id="ttxt">我家的私房菜</span>
      <span class="tpen">✏️</span>
    </div>
    <div style="display:flex;gap:3px">
      <button class="hbt" id="hb2" style="display:none" onclick="openMembers()">👨‍👩‍👧</button>
      <button class="hbt" id="hb1" onclick="hdrAct()">＋</button>
    </div>
  </div>
  <div id="swrap" style="display:none">
    <div class="swrap"><span class="sico">🔍</span><input class="sinp" id="srch" placeholder="搜索菜名或食材…" oninput="renderRecipes()"></div>
  </div>
</div>
<div class="body">
  <div class="pg on" id="pg0"><div id="rlist"></div></div>
  <div class="pg" id="pg1"><div id="wk"></div></div>
  <div class="pg" id="pg2"><div id="shop"></div></div>
</div>
<nav class="bnav">
  <button class="nb on" id="nb0" onclick="goTab(0)"><div class="nbw"><span class="nbi">🍳</span></div><span>菜谱</span></button>
  <button class="nb" id="nb1" onclick="goTab(1)"><div class="nbw"><span class="nbi">📅</span></div><span>本周</span></button>
  <button class="nb" id="nb2" onclick="goTab(2)"><div class="nbw"><span class="nbi">🛒</span></div><span>买菜</span></button>
</nav>
</div>
<div class="mo" id="modal" onclick="mOut(event)">
  <div class="mbox">
    <div class="mhan"></div>
    <div class="mhdr"><span class="mttl" id="mttl"></span><button class="mcls" onclick="closeM()">×</button></div>
    <div class="mbdy" id="mbdy"></div>
  </div>
</div>
<input type="file" id="imgfile" accept="image/*" style="display:none" onchange="onImg(event)">
<script>
const DAYS=['周一','周二','周三','周四','周五','周六','周日'];
const MEALS=[{k:'breakfast',l:'早餐',i:'🌅'},{k:'lunch',l:'午餐',i:'☀️'},{k:'dinner',l:'晚餐',i:'🌙'},{k:'fruit',l:'水果零食',i:'🍎'}];
const AVC=['#4a7c59','#1a60a8','#a0296b','#5a3ab7','#b07828','#b83a2a'];
const STC=['#4a7c59','#1a60a8','#a0296b','#5a3ab7','#b07828'];
let S={
  title:'我家的私房菜',
  recipes:[
    {id:1,name:'红烧肉',emoji:'🥩',status:'learning',tags:['荤菜','下饭'],prepDays:0,prepNote:'',ing:[{n:'五花肉',q:'500g'},{n:'老抽',q:'2勺'},{n:'冰糖',q:'适量'},{n:'葱姜蒜',q:'适量'}],steps:['五花肉焯水','炒糖色','加调料焖1小时','大火收汁'],imgData:''},
    {id:2,name:'酱牛肉',emoji:'🥩',status:'learning',tags:['荤菜'],prepDays:1,prepNote:'提前一天腌制牛肉12小时',ing:[{n:'牛腱子',q:'500g'},{n:'老抽',q:'3勺'},{n:'八角',q:'2个'},{n:'花椒',q:'适量'}],steps:['提前腌制12小时','冷水焯水','小火焖1.5小时','晾凉切片'],imgData:''},
    {id:3,name:'番茄炒鸡蛋',emoji:'🍅',status:'done',tags:['素菜','快手'],prepDays:0,prepNote:'',ing:[{n:'番茄',q:'2个'},{n:'鸡蛋',q:'3个'},{n:'盐',q:'适量'}],steps:['鸡蛋打散加盐','热锅炒蛋盛出','炒番茄出汁加鸡蛋翻炒'],imgData:''},
    {id:4,name:'清蒸鱼',emoji:'🐟',status:'learning',tags:['荤菜','清淡'],prepDays:0,prepNote:'',ing:[{n:'鲈鱼',q:'1条'},{n:'姜',q:'数片'},{n:'葱',q:'适量'},{n:'豉油',q:'2勺'}],steps:['鱼划刀塞姜','水开蒸8分钟','淋热油和豉油'],imgData:''},
  ],
  members:[
    {id:'m1',name:'妈妈',emoji:'👩',color:AVC[2],notes:'少盐少油，不吃辣'},
    {id:'m2',name:'爸爸',emoji:'👨',color:AVC[0],notes:'无特殊要求'},
    {id:'m3',name:'孩子',emoji:'🧒',color:AVC[3],notes:'不吃香菜，不吃苦瓜'},
  ],
  weekly:{},
  shop:{stores:[{id:'s1',name:'菜市场',color:STC[0]},{id:'s2',name:'超市',color:STC[1]}],items:[],reminds:[]}
};
function sv(){try{localStorage.setItem('hcv8',JSON.stringify(S))}catch(e){}}
function ld(){try{const d=localStorage.getItem('hcv8');if(d)S=JSON.parse(d)}catch(e){}}
ld();
document.getElementById('ttxt').textContent=S.title||'我家的私房菜';
function startTitle(){
  const w=document.getElementById('twrap');
  w.innerHTML=`<input class="tinp" id="ti" value="${S.title}" onblur="saveTitle()" onkeydown="if(event.key==='Enter')this.blur()">`;
  document.getElementById('ti').focus();
}
function saveTitle(){
  const v=document.getElementById('ti')?.value.trim()||'我家的私房菜';
  S.title=v;sv();
  const w=document.getElementById('twrap');
  w.innerHTML=`<span class="ttxt" id="ttxt">${v}</span><span class="tpen">✏️</span>`;
  w.onclick=startTitle;
}
let curTab=0;
function goTab(t){
  curTab=t;
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('on',i===t));
  document.querySelectorAll('.pg').forEach((p,i)=>p.classList.toggle('on',i===t));
  document.getElementById('hb1').style.display=t===1?'none':'flex';
  document.getElementById('hb1').textContent=t===2?'🏪':'＋';
  document.getElementById('hb2').style.display=t===1?'flex':'none';
  document.getElementById('swrap').style.display=t===0?'block':'none';
  document.querySelector('.body').scrollTop=0;
  if(t===0)renderRecipes();
  if(t===1)renderWeekly();
  if(t===2)renderShop();
}
function hdrAct(){if(curTab===0)openAddR();if(curTab===2)openStores()}
let rFilter='all';
function renderRecipes(){
  const q=(document.getElementById('srch')?.value||'').trim().toLowerCase();
  let rs=S.recipes;
  if(rFilter==='learning')rs=rs.filter(r=>r.status==='learning');
  if(rFilter==='done')rs=rs.filter(r=>r.status==='done');
  if(q)rs=rs.filter(r=>r.name.toLowerCase().includes(q)||r.ing.some(i=>i.n.toLowerCase().includes(q)));
  const el=document.getElementById('rlist');

function togSlot(o,d,m,rid,label){
  const r=S.recipes.find(x=>x.id===rid);if(!r)return;
  let a=gSlot(o,d,m);const i=a.findIndex(x=>String(x.id)===String(rid));
  if(i>=0)a.splice(i,1);else a.push({id:rid,name:r.name,emoji:r.emoji});
  sSlot(o,d,m,a);openPicker(o,d,m,label);renderWeekly();
}
function genList(){
  const map={};
  Object.keys(S.weekly).filter(k=>k.startsWith('family-')).forEach(k=>(S.weekly[k]||[]).forEach(m=>{const r=S.recipes.find(x=>x.id===m.id);if(r)r.ing.forEach(i=>{if(!map[i.n])map[i.n]={id:Date.now()+Math.random(),name:i.n,qty:i.q,storeId:null,checked:false}})}));
  Object.keys(S.weekly).filter(k=>!k.startsWith('family-')).forEach(k=>(S.weekly[k]||[]).forEach(m=>{const r=S.recipes.find(x=>x.id===m.id);if(r)r.ing.forEach(i=>{if(!map[i.n])map[i.n]={id:Date.now()+Math.random(),name:i.n,qty:i.q,storeId:null,checked:false}})}));
  const seen=new Set(),reminds=[];
  Object.values(S.weekly).forEach(a=>(a||[]).forEach(m=>{const r=S.recipes.find(x=>x.id===m.id);if(r&&r.prepDays>0&&!seen.has(r.id)){seen.add(r.id);reminds.push(r)}}));
  const manual=S.shop.items.filter(i=>i.manual);
  S.shop.items=[...Object.values(map),...manual];
  S.shop.reminds=reminds;sv();goTab(2);
}

    }

      const sti=assigned.filter(i=>i.storeId===st.id);if(!sti.length)return;

    });

  const it=S.shop.items.find(x=>String(x.id)===String(id));if(!it)return;
  document.getElementById('mttl').textContent='选择购买地点';
  document.getElementById('mbdy').innerHTML=`<div class="rcard" style="padding:0 14px">
    <div class="loc-opt" onclick="assignLoc('${id}',null)"><div class="loc-dot" style="background:var(--sand2)"></div><span style="flex:1;font-size:14px">不指定</span>${!it.storeId?'<span style="color:var(--sage);font-weight:700">✓</span>':''}</div>
    ${S.shop.stores.map(s=>`<div class="loc-opt" onclick="assignLoc('${id}','${s.id}')"><div class="loc-dot" style="background:${s.color}"></div><span style="flex:1;font-size:14px">${s.name}</span>${it.storeId===s.id?'<span style="color:var(--sage);font-weight:700">✓</span>':''}</div>`).join('')}
  </div>`;
  openM();
}
function assignLoc(id,storeId){const it=S.shop.items.find(x=>String(x.id)===String(id));if(it){it.storeId=storeId;sv()}closeM();renderShop()}
function startAdd(key){inlineStore=key;renderShop()}
function cancelAdd(){inlineStore=null;renderShop()}
function confirmAdd(key){
  const n=(document.getElementById(`ni-n-${key}`)?.value||'').trim();
  const q=(document.getElementById(`ni-q-${key}`)?.value||'').trim();
  if(!n){cancelAdd();return}
  S.shop.items.push({id:Date.now(),name:n,qty:q,storeId:null,checked:false,manual:true});
  sv();inlineStore=null;renderShop();
}
function niKey(e,key){if(e.key==='Enter')confirmAdd(key);if(e.key==='Escape')cancelAdd()}
function togSI(id){const i=S.shop.items.find(x=>String(x.id)===String(id));if(i)i.checked=!i.checked;sv();renderShop()}
function editSI(id){
  const it=S.shop.items.find(x=>String(x.id)===String(id));if(!it)return;
  document.getElementById('mttl').textContent='编辑食材';
  document.getElementById('mbdy').innerHTML=`<div class="fg"><div class="fl">食材名</div><input type="text" id="sin" value="${it.name}"></div><div class="fg"><div class="fl">用量</div><input type="text" id="siq" value="${it.qty}"></div><button class="bp" onclick="saveSI('${id}')">保存</button><button class="bo red" style="width:100%;margin-top:8px" onclick="delSI('${id}')">删除</button>`;
  openM();
}
function saveSI(id){const it=S.shop.items.find(x=>String(x.id)===String(id));if(it){it.name=document.getElementById('sin').value.trim();it.qty=document.getElementById('siq').value.trim()}sv();closeM();renderShop()}
function delSI(id){S.shop.items=S.shop.items.filter(x=>String(x.id)!==String(id));sv();closeM();renderShop()}
function clearCk(){S.shop.items=S.shop.items.filter(i=>!i.checked);sv();renderShop()}
function openStores(){document.getElementById('mttl').textContent='管理购买地点';renderStoresBody();openM()}
function renderStoresBody(){
  document.getElementById('mbdy').innerHTML=`<div style="margin-bottom:12px">${S.shop.stores.map(s=>`<div class="note-row"><div style="width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0"></div><span style="flex:1;font-size:14px">${s.name}</span><button onclick="delSt('${s.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:17px;line-height:1">×</button></div>`).join('')}</div><div style="display:flex;gap:8px"><input type="text" id="nstn" placeholder="新地点名称" style="flex:1"><button class="bo" onclick="addSt()">添加</button></div>`;
}
function addSt(){const n=document.getElementById('nstn').value.trim();if(!n)return;S.shop.stores.push({id:'s'+Date.now(),name:n,color:STC[S.shop.stores.length%STC.length]});sv();renderStoresBody()}
function delSt(id){S.shop.stores=S.shop.stores.filter(s=>s.id!==id);S.shop.items.forEach(i=>{if(i.storeId===id)i.storeId=null});sv();renderStoresBody()}
function openM(){document.getElementById('modal').classList.add('op')}
function closeM(){document.getElementById('modal').classList.remove('op')}
function mOut(e){if(e.target===document.getElementById('modal'))closeM()}
renderRecipes();
document.getElementById('swrap').style.display='block';
</script>
</body>
</html>
